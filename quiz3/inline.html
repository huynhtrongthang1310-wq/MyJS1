<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Cách 1 — Inline JavaScript</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 2rem; background: #f5f5f5; }
    .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 1.5rem 2rem; max-width: 480px; }
    h2 { font-size: 16px; margin-bottom: 0.5rem; }
    .badge { display: inline-block; background: #fef9c3; color: #854d0e; font-size: 12px; padding: 2px 8px; border-radius: 4px; margin-bottom: 1rem; font-family: monospace; }
    p { font-size: 14px; color: #555; margin-bottom: 1.25rem; }
    button { padding: 10px 22px; background: #f59e0b; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
    button:hover { background: #d97706; }
    .note { margin-top: 1rem; font-size: 12px; color: #999; border-top: 1px solid #eee; padding-top: 0.75rem; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Cách 1 — Inline JavaScript</h2>
    <span class="badge">onclick="..."</span>
    <p>JS được viết trực tiếp trong thuộc tính HTML. Nhanh để minh họa nhưng khó bảo trì khi dự án lớn.</p>

    <!-- Inline JS: viết thẳng vào thuộc tính onclick -->
    <button onclick="alert('Xin chào từ Inline JS! 👋')">Bấm tôi</button>

    <p class="note">⚠ Không nên dùng cho dự án thực tế — khó đọc, khó tái sử dụng, không tách biệt logic.</p>
  </div>
</body>
</html>
