<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Cách 2 — Internal JavaScript</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 2rem; background: #f5f5f5; }
    .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 1.5rem 2rem; max-width: 480px; }
    h2 { font-size: 16px; margin-bottom: 0.5rem; }
    .badge { display: inline-block; background: #dbeafe; color: #1e3a5f; font-size: 12px; padding: 2px 8px; border-radius: 4px; margin-bottom: 1rem; font-family: monospace; }
    p { font-size: 14px; color: #555; margin-bottom: 1.25rem; }
    button { padding: 10px 22px; background: #1a73e8; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
    button:hover { background: #1558b0; }
    .note { margin-top: 1rem; font-size: 12px; color: #999; border-top: 1px solid #eee; padding-top: 0.75rem; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Cách 2 — Internal JavaScript</h2>
    <span class="badge">&lt;script&gt; trong cùng file</span>
    <p>JS được viết trong thẻ <code>&lt;script&gt;</code> ngay trong file HTML. Phù hợp cho trang đơn lẻ hoặc demo nhỏ.</p>

    <button id="btn-internal">Bấm tôi</button>

    <p class="note">✅ Tốt hơn inline — logic tách khỏi HTML. Nhưng vẫn chưa tái sử dụng được giữa nhiều trang.</p>
  </div>

  <!-- Internal JS: viết trong thẻ script, cùng file HTML -->
  <script>
    document.getElementById("btn-internal").addEventListener("click", function () {
      alert("Xin chào từ Internal JS! 📄");
    });
  </script>
</body>
</html>
