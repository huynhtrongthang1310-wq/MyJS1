<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Cách 3 — External JavaScript</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 2rem; background: #f5f5f5; }
    .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 1.5rem 2rem; max-width: 480px; }
    h2 { font-size: 16px; margin-bottom: 0.5rem; }
    .badge { display: inline-block; background: #dcfce7; color: #14532d; font-size: 12px; padding: 2px 8px; border-radius: 4px; margin-bottom: 1rem; font-family: monospace; }
    p { font-size: 14px; color: #555; margin-bottom: 1.25rem; }
    button { padding: 10px 22px; background: #16a34a; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
    button:hover { background: #15803d; }
    .note { margin-top: 1rem; font-size: 12px; color: #999; border-top: 1px solid #eee; padding-top: 0.75rem; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Cách 3 — External JavaScript</h2>
    <span class="badge">&lt;script src="..."&gt;</span>
    <p>JS được viết trong file riêng <code>script.js</code> và liên kết qua thuộc tính <code>src</code>. Đây là cách chuẩn cho dự án thực tế.</p>

    <button id="btn-external">Bấm tôi</button>

    <p class="note">✅✅ Tốt nhất — tách biệt hoàn toàn, dễ bảo trì, tái sử dụng được trên nhiều trang HTML.</p>
  </div>

  <!-- External JS: load từ file script.js bên ngoài -->
  <script src="../js/script.js"></script>
</body>
</html>
