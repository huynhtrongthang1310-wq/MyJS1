<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bài 2 — TODO code: rẽ nhánh và lặp</title>
  <link rel="stylesheet" href="../css/control.css" />
</head>
<body>
  <div class="container">
    <h2>▼ Bài 2 — TODO code: rẽ nhánh và lặp</h2>
    <p class="subtitle">Hoàn thiện ý tưởng sau: nhập điểm, in xếp loại và tính tổng từ 1 đến 5.</p>

    <div class="input-row">
      <label for="scoreInput">Nhập điểm (0 – 10):</label>
      <input type="number" id="scoreInput" min="0" max="10" step="0.1" value="7.2" />
      <button onclick="runCode()">Chạy</button>
    </div>

    <div class="output-box" id="output"></div>

    <div class="checklist">
      <label class="check-item" id="check1">
        <input type="checkbox" id="cb1" disabled />
        Em đã viết xong khối <code>if...else if...else</code>.
      </label>
      <label class="check-item" id="check2">
        <input type="checkbox" id="cb2" disabled />
        Em đã viết xong vòng lặp <code>for</code> in 1 → 5.
      </label>
      <label class="check-item" id="check3">
        <input type="checkbox" id="cb3" disabled />
        Em đã tính được tổng = 15.
      </label>
    </div>
  </div>

  <script src="../js/control.js"></script>
</body>
</html>
